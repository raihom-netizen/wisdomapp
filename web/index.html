  <script>
    (function(){
      try {
        var splash = document.getElementById("app-splash");
        var progress = document.getElementById("splash-progress");
        var status = document.getElementById("splash-status");
        var msgs = ["Abrindo…", "Preparando módulos…", "Quase pronto…"];
        var msgIdx = 0;
        var msgTimer = setInterval(function(){
          if (!status || !splash || splash.style.display === "none") return;
          msgIdx = Math.min(msgIdx + 1, msgs.length - 1);
          status.textContent = msgs[msgIdx];
        }, 900);
        function hideSplash() {
          try {
            clearInterval(msgTimer);
            if (splash) {
              splash.style.opacity = "0";
              splash.style.visibility = "hidden";
              setTimeout(function() { if (splash) splash.style.display = "none"; }, 350);
            }
          } catch (e) {}
        }
        window.addEventListener("flutter-first-frame", function() {
          try {
            if (progress) progress.style.width = "100%";
            if (status) status.textContent = "Pronto!";
            setTimeout(hideSplash, 180);
          } catch (e) {}
        });
        setTimeout(function() { try { if (progress) progress.style.width = "35%"; } catch (e) {} }, 120);
        setTimeout(function() { try { if (progress) progress.style.width = "62%"; } catch (e) {} }, 700);
        setTimeout(function() { try { if (progress) progress.style.width = "85%"; } catch (e) {} }, 1400);
        setTimeout(hideSplash, 8000);
      } catch (e) {}
    })();
  </script>
  <!-- PWA install helper: Android/Chrome = prompt nativo; iOS = instruções no app -->
  <script>
    let deferredPrompt = null;

    window.pwaInstall = {
      isIos: function () {
        return /iphone|ipad|ipod/i.test(navigator.userAgent);
      },
      isInStandaloneMode: function () {
        return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
          || (window.navigator.standalone === true);
      },
      canPromptInstall: function () {
        return deferredPrompt !== null;
      },
      promptInstall: async function () {
        if (!deferredPrompt) return { outcome: "unavailable" };
        deferredPrompt.prompt();
        const choiceResult = await deferredPrompt.userChoice;
        deferredPrompt = null;
        return { outcome: choiceResult && choiceResult.outcome ? choiceResult.outcome : "unknown" };
      }
    };

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      window.dispatchEvent(new Event('pwa-install-available'));
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      window.dispatchEvent(new Event('pwa-installed'));
    });

    window.instalarApp = function() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(choiceResult) {
          if (choiceResult.outcome === 'accepted') console.log('Usuário aceitou a instalação');
          deferredPrompt = null;
        });
      } else {
        if (window.pwaInstall.isIos()) alert("Toque no ícone 'Compartilhar' e depois em 'Adicionar à Tela de Início'.");
      }
    };
  </script>

  <!-- Warm-up do teclado nativo: pisca foco no input invisível assim que o
       Flutter Web sobe, para o Chrome/Gboard (Android) e Safari (iOS)
       inicializarem o subsistema de IME. No primeiro toque real do usuário
       o teclado abre instantaneamente. Roda 1x e nunca mais. -->
  <script>
    (function() {
      var ran = false;
      function warmupKeyboard() {
        if (ran) return; ran = true;
        try {
          var el = document.getElementById('ct-keyboard-warmup');
          if (!el) return;
          // Foco silencioso (preventScroll evita pulo de scroll na PWA)
          el.focus({ preventScroll: true });
          // Blur imediato para não roubar o cursor real do app
          setTimeout(function () { try { el.blur(); } catch (e) {} }, 0);
        } catch (e) {}
      }
      // Dispara após Flutter desenhar a primeira frame (app pronto)
      window.addEventListener('flutter-first-frame', function () {
        setTimeout(warmupKeyboard, 200);
      });
      // Fallback: dispara também no primeiro toque/click (caso o evento
      // flutter-first-frame não tenha rodado por algum motivo)
      var firstInteract = function () {
        warmupKeyboard();
        window.removeEventListener('touchstart', firstInteract, true);
        window.removeEventListener('mousedown', firstInteract, true);
      };
      window.addEventListener('touchstart', firstInteract, { capture: true, passive: true });
      window.addEventListener('mousedown', firstInteract, { capture: true });
    })();
  </script>
  <!-- iPhone: NÃO reposicionar o host com visualViewport — no iOS isso dessincroniza toque (registra “um pouco acima”). Manter host em 0,0 com 100% faz coordenadas baterem (como em apps que não têm o problema). Em não‑iOS o sync opcional pode ser reativado. -->
  <script>
    (function() {
      var vv = window.visualViewport;
      if (!vv) return;
      var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

        var el = document.getElementById("flutter-host") || document.querySelector("flutter-view") || document.querySelector("flt-glass-pane") || document.querySelector("[id^=\'flutter\']");
        if (el) return el;
        var c = document.querySelector("canvas");
        return c ? c.parentElement : null;
      }
      function syncVisualViewport() {
        if (isIOS) return;
        var host = getFlutterHost();
        if (!host) return;
        host.style.top = vv.offsetTop + "px";
        host.style.left = vv.offsetLeft + "px";
        host.style.width = vv.width + "px";
        host.style.height = vv.height + "px";
      }
      function ensureHostFullViewport() {
        var host = getFlutterHost();
        if (!host || !isIOS) return;
        host.style.top = "0";
        host.style.left = "0";
        host.style.width = "100%";
        host.style.height = "100%";

      vv.addEventListener("resize", function() { if (isIOS) ensureHostFullViewport(); else syncVisualViewport(); });
      vv.addEventListener("scroll", syncVisualViewport);
      window.addEventListener("orientationchange", function() {
        if (isIOS) {
          ensureHostFullViewport();
          [50, 150, 300].forEach(function(ms) { setTimeout(ensureHostFullViewport, ms); });
        } else {
          syncVisualViewport();
          [50, 150, 300].forEach(function(ms) { setTimeout(syncVisualViewport, ms); });
        }
      });
      function onPageVisible() {
        if (isIOS) {
          ensureHostFullViewport();
          [50, 150, 400].forEach(function(ms) { setTimeout(ensureHostFullViewport, ms); });
        } else {
          syncVisualViewport();
          [50, 150, 400].forEach(function(ms) { setTimeout(syncVisualViewport, ms); });
        }
        try { window.dispatchEvent(new Event("flutter-app-visible")); } catch (e) {}
      }
      document.addEventListener("visibilitychange", function() {
        if (document.visibilityState === "visible") onPageVisible();
      });
      window.addEventListener("pageshow", function(ev) {
        if (!ev.persisted) return;
        onPageVisible();
      });
