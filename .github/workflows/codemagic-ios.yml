name: Trigger Codemagic iOS

on:
  push:
    branches:
      - main
      - 'codemagic-*-ready'
  workflow_dispatch:

jobs:
  codemagic:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar build CodeMagic (webhook)
        env:
          CM_APP_ID: 6a3fe39cfbfdda27bec38156
          CM_BRANCH: ${{ github.ref_name }}
          CM_SHA: ${{ github.sha }}
        run: |
          payload="{\"ref\":\"refs/heads/${CM_BRANCH}\",\"repository\":{\"name\":\"wisdomapp\",\"full_name\":\"raihom-netizen/wisdomapp\",\"html_url\":\"https://github.com/raihom-netizen/wisdomapp\",\"default_branch\":\"main\",\"private\":true},\"pusher\":{\"name\":\"github-actions\"},\"head_commit\":{\"id\":\"${CM_SHA}\",\"message\":\"trigger CodeMagic iOS\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}}"
          code=$(curl -sS -o /tmp/cm_resp.txt -w "%{http_code}" \
            -X POST "https://api.codemagic.io/hooks/${CM_APP_ID}" \
            -H "Content-Type: application/json" \
            -d "$payload")
          echo "CodeMagic webhook HTTP $code"
          cat /tmp/cm_resp.txt || true
          if [ "$code" = "404" ]; then
            echo "::warning::App wisdomapp ARCHIVED no CodeMagic. Desarquive ou configure CODEMAGIC_API_TOKEN no GitHub Secrets."
            exit 0
          fi
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::warning::Webhook CodeMagic retornou $code"
            exit 0
          fi
