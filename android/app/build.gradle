plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
android {
    namespace = "com.wisdomapp.app"
    compileSdk = 37
    // NDK 28+ (stack / plugins nativos; avisos do Gradle).
    ndkVersion = "28.2.13676358"
    compileOptions {
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = "17" }
    // false: empacotamento atual de .so (Play / Android 15+ — páginas de memória 16 KB). true era legado e pode gerar alerta na Console.
    packaging { jniLibs { useLegacyPackaging = false } }
    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
            }
        }
    }
    buildTypes {
        release {
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    defaultConfig {
        applicationId = "com.wisdomapp.app"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 36
        versionCode = 9
        versionName = "10.04"
        multiDexEnabled = true
    }
}
dependencies {
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
    // MainActivity: enableEdgeToEdge() — Play / Android 15+ (insets)
    implementation "androidx.activity:activity-ktx:1.10.1"
    implementation "androidx.core:core-ktx:1.15.0"
    implementation "com.google.android.material:material:1.12.0"
}

