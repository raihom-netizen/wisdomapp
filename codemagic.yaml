# Codemagic CI/CD — WISDOMAPP (somente iOS iPhone)
# Versão marketing: lib/constants/app_version.dart → AppVersion.current
# CFBundleVersion (anti 90189): usa o MESMO buildNumber do repo (web/Android/iOS).
#   Se ASC/floor >= buildNumber → falha; rode scripts/bump_build.ps1 + push antes do build.
#   NÃO use «Retry» só no passo Publishing (reutiliza o mesmo .ipa → erro 90189).
# Disparo: push em main/codemagic-* (triggering abaixo) ou API/scripts/Fix-CodemagicIosCompleto.ps1
# UI: se wisdomapp estiver Archived, rode Fix-CodemagicIos.bat (registra app novo + inicia build via API)
#
# Assinatura AUTOMÁTICA — integração Apple WISDOMAPP:
#   Team integrations → Developer Portal → wisdomapp (Key 4UMWWALR3U)
#   Grupo Team "appstore_credentials" → CERTIFICATE_PRIVATE_KEY (secret)
#   Bundle com.wisdomapp — perfil App Store criado/atualizado automaticamente no build.
# Opcional: grupo "firebase_ipa_upload" (FIREBASE_SERVICE_ACCOUNT_JSON) para IPA no site.

workflows:
  ios-workflow:
    name: iOS Build — WISDOMAPP
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: codemagic-*-ready
          include: true
    integrations:
      app_store_connect: wisdomapp
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.wisdomapp"
        # APP_STORE_APPLE_ID: resolvido em runtime (scripts/codemagic_ios_resolve_app_store_apple_id.sh)
        APP_STORE_CONNECT_KEY_IDENTIFIER: "4UMWWALR3U"
        APP_STORE_CONNECT_ISSUER_ID: "77a1debb-f68b-418d-9fe3-af0f37b40585"
        FIREBASE_STORAGE_BUCKET: "wisdomapp-b9e98.firebasestorage.app"
      groups:
        - appstore_credentials
        - firebase_ipa_upload
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Keychain para code signing
        script: keychain initialize
      - name: Ativar Sign In with Apple no App ID (API Apple)
        script: |
          set -e
          python3 << 'PY'
          import json, os, re, subprocess, sys, time
          bundle = os.environ.get("BUNDLE_ID", "com.wisdomapp")
          r = subprocess.run(
              [
                  "app-store-connect", "bundle-ids", "list",
                  "--bundle-id-identifier", bundle,
                  "--strict-match-identifier",
                  "--platform", "IOS",
                  "--json", "-s",
              ],
              capture_output=True,
              text=True,
          )
          if r.returncode != 0:
              print("ERRO bundle-ids list:", (r.stderr or r.stdout)[:900])
              sys.exit(1)
          try:
              j = json.loads((r.stdout or "").strip() or "null")
          except json.JSONDecodeError as e:
              print("ERRO JSON bundle-ids list:", e)
              sys.exit(1)
          if isinstance(j, dict):
              data = j.get("data") or []
          elif isinstance(j, list):
              data = j
          else:
              data = []
          if not data or not isinstance(data[0], dict):
              print("ERRO: nenhum Bundle ID iOS para", bundle)
              sys.exit(1)
          rid = data[0].get("id")
          if not rid:
              sys.exit(1)
          print("Bundle ID resource id:", rid)
          candidates = [
              "Sign In with Apple",
              "APPLE_ID_AUTH",
              "SIGN_IN_WITH_APPLE",
          ]
          last_out = ""
          enabled = False
          for cap in candidates:
              ec = subprocess.run(
                  [
                      "app-store-connect", "bundle-ids", "enable-capabilities", rid,
                      "--capability", cap,
                  ],
                  capture_output=True,
                  text=True,
              )
              out = ((ec.stderr or "") + (ec.stdout or "")).strip()
              last_out = out
              low = out.lower()
              if ec.returncode == 0:
                  print(f"Sign In with Apple: capability ativada com '{cap}'.")
                  enabled = True
                  break
              if any(b in low for b in ("already", "duplicate", "exist", "409", "conflict", "not modified", "unchanged")):
                  print(f"Sign In with Apple: capability ja ativa (resposta ao tentar '{cap}').")
                  enabled = True
                  break
              print(f"Tentativa capability '{cap}' falhou: {out[:300]}")
          if not enabled:
              print("ERRO enable-capabilities — nao foi possivel ativar Sign In with Apple no App ID.")
              print("Detalhe:", (last_out or "")[:900])
              sys.exit(1)

          def caps_has_sign_in(txt):
              try:
                  jc = json.loads((txt or "").strip() or "{}")
              except json.JSONDecodeError:
                  return False
              blob = json.dumps(jc)
              return bool(
                  re.search(
                      r"SIGN_IN_WITH_APPLE|APPLE_ID_AUTH|Sign[\s_]?In[\s_]?with[\s_]?Apple|SignInWithApple|com\.apple\.developer\.applesignin",
                      blob,
                      re.I | re.DOTALL,
                  )
              )

          for attempt in (1, 2):
              caps = subprocess.run(
                  ["app-store-connect", "bundle-ids", "capabilities", rid, "--json", "-s"],
                  capture_output=True,
                  text=True,
              )
              caps_out = caps.stdout or ""
              if caps.returncode != 0:
                  print("ERRO bundle-ids capabilities:", (caps.stderr or "")[:900])
                  sys.exit(1)
              if caps_has_sign_in(caps_out):
                  print("OK: Sign In with Apple confirmado na API.")
                  break
              if attempt == 1:
                  print("AVISO: Sign In ainda nao aparece; aguardando 60s...")
                  time.sleep(60)
              else:
                  print("ERRO: Sign In with Apple nao consta em bundle-ids capabilities.")
                  sys.exit(1)
          PY
          echo "Aguardando propagacao (90s)..."
          sleep 90
      - name: Ativar Push Notifications no App ID (API Apple)
        script: |
          set -e
          python3 << 'PY'
          import json, os, subprocess, sys
          bundle = os.environ.get("BUNDLE_ID", "com.wisdomapp")
          r = subprocess.run(
              [
                  "app-store-connect", "bundle-ids", "list",
                  "--bundle-id-identifier", bundle,
                  "--strict-match-identifier",
                  "--platform", "IOS",
                  "--json", "-s",
              ],
              capture_output=True,
              text=True,
          )
          if r.returncode != 0:
              print("ERRO bundle-ids list:", (r.stderr or r.stdout)[:900])
              sys.exit(1)
          j = json.loads((r.stdout or "").strip() or "null")
          data = j.get("data") if isinstance(j, dict) else (j if isinstance(j, list) else [])
          if not data or not isinstance(data[0], dict):
              print("ERRO: nenhum Bundle ID iOS para", bundle)
              sys.exit(1)
          rid = data[0].get("id")
          if not rid:
              sys.exit(1)
          candidates = ["Push Notifications", "PUSH_NOTIFICATIONS"]
          enabled = False
          last_out = ""
          for cap in candidates:
              ec = subprocess.run(
                  [
                      "app-store-connect", "bundle-ids", "enable-capabilities", rid,
                      "--capability", cap,
                  ],
                  capture_output=True,
                  text=True,
              )
              out = ((ec.stderr or "") + (ec.stdout or "")).strip()
              last_out = out
              low = out.lower()
              if ec.returncode == 0 or any(
                  b in low for b in ("already", "duplicate", "exist", "409", "conflict", "not modified", "unchanged")
              ):
                  print(f"Push Notifications: OK com '{cap}'.")
                  enabled = True
                  break
              print(f"Tentativa '{cap}' falhou: {out[:300]}")
          if not enabled:
              print("ERRO enable Push Notifications:", (last_out or "")[:900])
              sys.exit(1)
          PY
          echo "Aguardando propagacao Push (60s)..."
          sleep 60
      - name: Remover perfis App Store antigos (força perfil com capabilities atuais)
        script: |
          set -e
          export BUNDLE_ID
          python3 scripts/codemagic_ios_delete_appstore_profiles.py
      - name: Buscar ou criar certificado e perfil (Apple)
        script: |
          set -e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --strict-match-identifier \
            --delete-stale-profiles
      - name: Instalar certificado no keychain
        script: keychain add-certificates
      - name: Aplicar perfis ao projeto Xcode
        script: xcode-project use-profiles
      - name: Resolver APP_STORE_APPLE_ID (bundle com.wisdomapp)
        script: bash scripts/codemagic_ios_resolve_app_store_apple_id.sh
      - name: Forçar iOS deployment target 15.5 (ML Kit)
        script: |
          set -e
          if [ -f ios/Runner.xcodeproj/project.pbxproj ]; then
            sed -i.bak "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.5;/g" ios/Runner.xcodeproj/project.pbxproj && rm -f ios/Runner.xcodeproj/project.pbxproj.bak
          fi
          if [ -f ios/Flutter/AppFrameworkInfo.plist ]; then
            sed -i.bak -e "s/<string>13.0<\/string>/<string>15.5<\/string>/g" -e "s/<string>14.0<\/string>/<string>15.5<\/string>/g" ios/Flutter/AppFrameworkInfo.plist && rm -f ios/Flutter/AppFrameworkInfo.plist.bak
          fi
      - name: Versão iOS (= web/Android, anti 90189)
        script: bash scripts/codemagic_ios_sync_version_from_app_version_dart.sh
      - name: Build iOS IPA (instalável)
        script: flutter build ipa --release --no-tree-shake-icons
      - name: Renomear IPA para WISDOMAPP (nome pubspec legado controle_total_premium)
        script: |
          set -e
          IPA_DIR="build/ios/ipa"
          NEW="$IPA_DIR/WISDOMAPP.ipa"
          if [ ! -d "$IPA_DIR" ]; then
            echo "Pasta $IPA_DIR inexistente. Procurando .ipa em build/ios..."
            find build/ios -name "*.ipa" -print 2>/dev/null || true
            exit 1
          fi
          echo "Conteudo de $IPA_DIR:"
          ls -la "$IPA_DIR" || true
          if [ -f "$NEW" ]; then
            echo "IPA ja correto: $NEW"
            exit 0
          fi
          for LEGACY in controle_total_premium.ipa Runner.ipa wisdomapp.ipa; do
            if [ -f "$IPA_DIR/$LEGACY" ]; then
              mv "$IPA_DIR/$LEGACY" "$NEW"
              echo "Renomeado $LEGACY -> WISDOMAPP.ipa"
              ls -la "$IPA_DIR"
              exit 0
            fi
          done
          OLD=$(find "$IPA_DIR" -maxdepth 1 -name "*.ipa" ! -name "WISDOMAPP.ipa" 2>/dev/null | head -1)
          if [ -n "$OLD" ] && [ -f "$OLD" ]; then
            mv "$OLD" "$NEW"
            echo "Renomeado $OLD -> $NEW"
            ls -la "$IPA_DIR"
            exit 0
          fi
          echo "Nenhum IPA em $IPA_DIR"
          find build/ios -name "*.ipa" -print 2>/dev/null || true
          exit 1
      - name: Subir IPA para o site (Firebase Storage)
        script: |
          IPA_PATH="build/ios/ipa"
          if [ ! -d "$IPA_PATH" ]; then echo "IPA não encontrado"; exit 1; fi
          IPA_FILE="$IPA_PATH/WISDOMAPP.ipa"
          if [ ! -f "$IPA_FILE" ]; then IPA_FILE=$(find "$IPA_PATH" -name "*.ipa" | head -1); fi
          if [ -z "$IPA_FILE" ] || [ ! -f "$IPA_FILE" ]; then echo "Nenhum .ipa em $IPA_PATH"; exit 1; fi
          IOS_URL="https://firebasestorage.googleapis.com/v0/b/wisdomapp-b9e98.firebasestorage.app/o/app%2Fipa%2FWISDOMAPP_app.ipa?alt=media"
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            if node scripts/upload_ipa_to_storage.js "$IPA_FILE"; then
              echo "IPA no site: $IOS_URL"
              echo "Para forçar atualização: Admin > Subir versão e forçar atualização."
            else
              echo "AVISO: Upload IPA falhou. TestFlight segue na fase Publishing."
            fi
          else
            echo "Defina firebase_ipa_upload (FIREBASE_SERVICE_ACCOUNT_JSON) para subir IPA ao site."
          fi
      - name: Validar IPA antes do TestFlight (90189 / binário inválido)
        script: bash scripts/codemagic_ios_validate_ipa_before_upload.sh build/ios/ipa/WISDOMAPP.ipa
      - name: Gate anti-90189 antes do Publishing
        script: bash scripts/codemagic_ios_pre_publish_90189_gate.sh
      - name: Actualizar floor ASC (próximo build)
        script: bash scripts/codemagic_ios_stamp_asc_floor.sh
    artifacts:
      - build/ios/ipa/WISDOMAPP.ipa
      - build/ios/ipa/*.ipa
      - ios/asc_build_number_floor.txt
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - raihom@gmail.com
        notify:
          success: true
          failure: true
